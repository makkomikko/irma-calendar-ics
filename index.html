<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orienteering Calendar - ICS Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        
        /* New Controls Bar styling */
        .controls-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .year-tabs { display: flex; gap: 10px; }
        .year-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #475569;
            transition: all 0.2s;
        }
        .year-btn.active {
            background: #667eea;
            color: white;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            color: #333;
        }
        .toggle-label input { margin-right: 8px; width: 16px; height: 16px; }

        .month-group { margin-bottom: 40px; }
        .month-header {
            color: white;
            font-size: 1.8em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
            text-transform: capitalize;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .event-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #667eea;
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        
        /* Cancelled Event Styling */
        .event-card.cancelled {
            border-left: 5px solid #ef4444;
            background: #fef2f2;
        }
        .event-card.cancelled h3 { color: #b91c1c; text-decoration: line-through; }
        .cancelled-badge {
            background: #ef4444;
            color: white;
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            text-decoration: none;
            display: inline-block;
        }

        .event-card h3 { color: #333; margin-bottom: 10px; word-break: break-word; }
        .event-card .date, .event-card .location { font-size: 0.9em; color: #666; margin-bottom: 8px; }
        .event-card .deadline { font-size: 0.9em; color: #d97706; margin-bottom: 15px; font-weight: 500; }
        
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .event-link, .download-btn {
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }
        .event-link { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .event-link:hover { background: #e2e8f0; }
        .download-btn { background: #667eea; color: white; }
        .download-btn:hover { background: #764ba2; }
        
        .loading { text-align: center; padding: 20px; color: white; font-size: 1.2em; }
        .no-events { text-align: center; padding: 40px; color: white; font-size: 1.1em; width: 100%; }
        footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏃 Suunnistuskalenteri</h1>
            <p>Download upcoming competitions as ICS files for your calendar</p>
        </header>
        
        <div class="controls-bar">
            <div id="year-tabs" class="year-tabs">
                </div>
            <label class="toggle-label">
                <input type="checkbox" id="show-cancelled" checked onchange="renderEvents()">
                Näytä perutut (Show cancelled)
            </label>
        </div>
        
        <div id="loading" class="loading">⏳ Ladataan tapahtumia...</div>
        <div id="calendar-content"></div>
        
        <footer>
            <p>Data source: Finnish Orienteering Association (IRMA)</p>
            <p>Päivitetty (Updated): <span id="lastUpdated">-</span></p>
        </footer>
    </div>
    
    <script>
        let allEvents = [];
        let activeYear = new Date().getFullYear().toString();

        async function loadData() {
            try {
                const response = await fetch('./ics_files/events.json');
                if (!response.ok) throw new Error('Events not found.');
                
                allEvents = await response.json();
                
                // Sort chronologically
                allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lastUpdated').textContent = new Date().toLocaleString('fi-FI');
                
                setupYearTabs();
                renderEvents();
            } catch (error) {
                document.getElementById('loading').textContent = `✗ Virhe: ${error.message}`;
            }
        }

        function setupYearTabs() {
            const tabsContainer = document.getElementById('year-tabs');
            tabsContainer.innerHTML = '';
            
            // Extract unique years
            const years = [...new Set(allEvents.map(e => e.date.substring(0, 4)))];
            years.sort();
            
            // If current year isn't in data, select the first available year
            if (!years.includes(activeYear) && years.length > 0) {
                activeYear = years[0];
            }

            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = `year-btn ${year === activeYear ? 'active' : ''}`;
                btn.textContent = year;
                btn.onclick = () => {
                    activeYear = year;
                    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderEvents();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderEvents() {
            const container = document.getElementById('calendar-content');
            const showCancelled = document.getElementById('show-cancelled').checked;
            container.innerHTML = '';

            // Filter by Year and Cancelled Status
            const filteredEvents = allEvents.filter(e => {
                const isCorrectYear = e.date.startsWith(activeYear);
                const isCancelledVisible = showCancelled || !e.cancelled;
                return isCorrectYear && isCancelledVisible;
            });

            if (filteredEvents.length === 0) {
                container.innerHTML = '<div class="no-events">Ei tapahtumia valitulle vuodelle.</div>';
                return;
            }

            // Group by Month
            let currentMonth = '';
            let currentGrid = null;

            filteredEvents.forEach(event => {
                const dateObj = new Date(event.date);
                // Finnish month name (e.g., "toukokuu")
                const monthName = dateObj.toLocaleDateString('fi-FI', { month: 'long' });

                if (monthName !== currentMonth) {
                    currentMonth = monthName;
                    
                    const monthSection = document.createElement('div');
                    monthSection.className = 'month-group';
                    
                    const header = document.createElement('h2');
                    header.className = 'month-header';
                    header.textContent = `${monthName} ${activeYear}`;
                    
                    currentGrid = document.createElement('div');
                    currentGrid.className = 'events-grid';
                    
                    monthSection.appendChild(header);
                    monthSection.appendChild(currentGrid);
                    container.appendChild(monthSection);
                }

                currentGrid.appendChild(createEventCard(event, dateObj));
            });
        }

        function createEventCard(event, dateObj) {
            const card = document.createElement('div');
            card.className = `event-card ${event.cancelled ? 'cancelled' : ''}`;
            
            // Standard Finnish Date format: ma 15.5.2026
            const formattedDate = dateObj.toLocaleDateString('fi-FI', { 
                weekday: 'short', day: 'numeric', month: 'numeric', year: 'numeric' 
            });
            
            let deadlineHtml = event.deadline ? `<div class="deadline">⏰ Ilmoittautuminen: ${event.deadline}</div>` : '';
            let linkHtml = event.link ? `<a href="${event.link}" target="_blank" class="event-link">🔗 IRMA</a>` : '';
            let cancelBadge = event.cancelled ? `<span class="cancelled-badge">Peruttu</span>` : '';
            
            card.innerHTML = `
                <h3>${escapeHtml(event.name)} ${cancelBadge}</h3>
                <div class="date">📅 ${formattedDate}</div>
                <div class="location">📍 ${escapeHtml(event.location)}</div>
                ${deadlineHtml}
                <div class="actions">
                    ${linkHtml}
                    <a href="ics_files/${encodeURIComponent(event.filename)}" class="download-btn" download>📥 Lataa ICS</a>
                </div>
            `;
            
            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>

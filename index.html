<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orienteering Calendar - ICS Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        
        /* New Controls Bar styling */
        .controls-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            flex-direction: column;
            width: 100%;
        }

        .year-tabs { display: flex; gap: 10px; }
        .year-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #475569;
            transition: all 0.2s;
        }
        .year-btn.active {
            background: #667eea;
            color: white;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            color: #333;
        }
        .toggle-label input { margin-right: 8px; width: 16px; height: 16px; }

        .month-group { margin-bottom: 40px; }
        .month-header {
            color: white;
            font-size: 1.8em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
            text-transform: capitalize;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .event-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #667eea;
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        
        /* Cancelled Event Styling */
        .event-card.cancelled {
            border-left: 5px solid #ef4444;
            background: #fef2f2;
        }
        .event-card.cancelled h3 { color: #b91c1c; text-decoration: line-through; }
        .cancelled-badge {
            background: #ef4444;
            color: white;
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            text-decoration: none;
            display: inline-block;
        }

        .event-card h3 { color: #333; margin-bottom: 10px; word-break: break-word; }
        .event-card .date, .event-card .location { font-size: 0.9em; color: #666; margin-bottom: 8px; }
        .event-card .deadline { font-size: 0.9em; color: #d97706; margin-bottom: 15px; font-weight: 500; }

        .category-tags { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .cat-tag {
            background: #e2e8f0; color: #475569; font-size: 0.75em;
            padding: 3px 8px; border-radius: 12px; font-weight: 600;
        }
        /* Color coding specific tags */
        .cat-tag.sm { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .cat-tag.yö { background: #1e293b; color: #f8fafc; }
        .cat-tag.viesti { background: #dcfce7; color: #166534; }
        
        .holiday-alert {
            background: #fef08a; color: #854d0e; padding: 6px 10px;
            border-radius: 5px; font-size: 0.85em; font-weight: bold;
            margin-bottom: 10px; border-left: 4px solid #eab308;
            display: inline-block;
        }
        .event-card.holiday { border-left: 5px solid #eab308; }

        .controls-bar { flex-direction: column; align-items: stretch; }
        /* Ensure the top row of controls wraps when space is tight */
        .top-controls {
            display: flex;
            flex-wrap: wrap; 
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        /* Group for Year Tabs and Area Select */
        .left-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            flex: 1; /* Allows it to take available space */
            min-width: 250px; /* Prevents it from getting too squashed */
        }
        .category-filters { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; padding-top: 10px; border-top: 1px solid #e2e8f0; }
        
        .cat-filter-btn {
            background: #f8fafc; border: 1px solid #cbd5e1; padding: 6px 12px;
            border-radius: 15px; cursor: pointer; font-size: 0.85em; color: #475569;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .cat-filter-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .closing-soon-tag {
            background: #ef4444; color: white; padding: 3px 8px;
            border-radius: 12px; font-size: 0.75em; font-weight: bold;
            margin-left: 10px; vertical-align: middle; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .event-link, .download-btn {
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }
        .event-link { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .event-link:hover { background: #e2e8f0; }
        .download-btn { background: #667eea; color: white; }
        .download-btn:hover { background: #764ba2; }

        /* Make the Area Dropdown grow to fit or wrap */
        .area-select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            background: white;
            font-weight: bold;
            color: #475569;
            cursor: pointer;
            flex: 1; /* Allows dropdown to expand on mobile */
            max-width: 100%;
            min-width: 150px;
        }
        
        .area-select:focus { border-color: #667eea; }
        
        .loading { text-align: center; padding: 20px; color: white; font-size: 1.2em; }
        .no-events { text-align: center; padding: 40px; color: white; font-size: 1.1em; width: 100%; }
        footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; padding-bottom: 20px; }

        body {
            background-color: #121212 !important;
            color: #e0e0e0 !important;
        }
        
        /* The main event cards */
        .event-card {
            background-color: #1e1e1e !important;
            border-color: #333333 !important;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4) !important;
        }
        
        /* Text inside the cards */
        .event-card h3, 
        .event-card h4 {
            color: #ffffff !important;
        }
        
        .event-card p, 
        .event-card div {
            color: #b0b0b0 !important;
        }
        
        /* The categories / tags */
        .tag {
            background-color: #1b3320 !important;
            color: #a5d6a7 !important;
            border: 1px solid #2e7d32 !important;
        }
        
        /* Search bar, dropdowns, and checkboxes */
        select, 
        input[type="text"], 
        input[type="checkbox"] {
            background-color: #2a2a2a !important;
            color: #e0e0e0 !important;
            border: 1px solid #444444 !important;
        }
        
        /* Ensure links stand out in the dark */
        a {
            color: #81c784 !important;
        }
        
        a:hover {
            color: #a5d6a7 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏃 Suunnistuskalenteri</h1>
            <p>Download upcoming competitions as ICS files for your calendar</p>
        </header>
        
        <div class="controls-bar">
            <div id="year-tabs" class="year-tabs">
                </div>
            <label class="toggle-label">
                <input type="checkbox" id="show-cancelled" onchange="renderEvents()">
                Näytä perutut (Show cancelled)
            </label>
        </div>
        
        <div id="loading" class="loading">⏳ Ladataan tapahtumia...</div>
        <div id="calendar-content"></div>
        
        <footer>
            <p>Data source: Finnish Orienteering Association (IRMA)</p>
            <p>Päivitetty (Updated): <span id="lastUpdated">-</span></p>
        </footer>
    </div>
    
    <script>
        let allEvents = [];
        let activeYear = new Date().getFullYear().toString();
        let activeCategory = 'Kaikki'; // 'All'
        let activeArea = 'Kaikki';

        async function loadData() {
            try {
                const response = await fetch('./ics_files/events.json');
                if (!response.ok) throw new Error('Events not found.');
                
                allEvents = await response.json();
                allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lastUpdated').textContent = new Date().toLocaleString('fi-FI');
                
                setupYearTabs();
                setupCategoryFilters();
                renderEvents();
            } catch (error) {
                document.getElementById('loading').textContent = `✗ Virhe: ${error.message}`;
            }
        }

        function setupYearTabs() {
            const tabsContainer = document.getElementById('year-tabs');
            tabsContainer.innerHTML = '';
            const years = [...new Set(allEvents.map(e => e.date.substring(0, 4)))].sort();
            if (!years.includes(activeYear) && years.length > 0) activeYear = years[0];

            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = `year-btn ${year === activeYear ? 'active' : ''}`;
                btn.textContent = year;
                btn.onclick = () => {
                    activeYear = year;
                    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderEvents();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function setupCategoryFilters() {
            let controlsBar = document.querySelector('.controls-bar');
            
            // 1. Structure the controls
            controlsBar.innerHTML = `
                <div class="top-controls">
                    <div class="left-group" style="display:flex; gap:10px; align-items:center;">
                        <div id="year-tabs" class="year-tabs"></div>
                        <select id="area-filter" class="area-select" onchange="setArea(this.value)">
                            <option value="Kaikki">Kaikki Alueet</option>
                        </select>
                    </div>
                    <label class="toggle-label">
                        <input type="checkbox" id="show-cancelled" checked onchange="renderEvents()">
                        Näytä perutut
                    </label>
                </div>
                <div id="category-filters" class="category-filters"></div>
            `;
            
            setupYearTabs();
            populateAreaDropdown();

            // 2. Setup Category Buttons
            const filterContainer = document.getElementById('category-filters');
            const allCats = new Set();
            allEvents.forEach(e => { if(e.categories) e.categories.forEach(c => allCats.add(c)); });

            const allBtn = document.createElement('button');
            allBtn.className = 'cat-filter-btn active';
            allBtn.textContent = 'Kaikki Tyypit';
            allBtn.onclick = (e) => setCategory(e.target, 'Kaikki');
            filterContainer.appendChild(allBtn);

            Array.from(allCats).sort().forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-filter-btn';
                btn.textContent = cat;
                btn.onclick = (e) => setCategory(e.target, cat);
                filterContainer.appendChild(btn);
            });
        }

        function populateAreaDropdown() {
            const dropdown = document.getElementById('area-filter');
            // Extract unique areas, filter out nulls/undefined, and sort
            const areas = [...new Set(allEvents.map(e => e.area))].filter(a => a && a !== "Tuntematon Alue").sort();
            
            areas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                dropdown.appendChild(opt);
            });
        }

        function setArea(val) {
            activeArea = val;
            renderEvents();
        }

        function setCategory(btnElement, category) {
            activeCategory = category;
            document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderEvents();
        }

        function parseFiDateToJS(dateStr) {
            // Converts "15.05.2026" to a JS Date object
            if(!dateStr) return null;
            const parts = dateStr.split('.');
            if(parts.length !== 3) return null;
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function renderEvents() {
            const container = document.getElementById('calendar-content');
            const showCancelled = document.getElementById('show-cancelled').checked;
            container.innerHTML = '';
            const today = new Date();
            today.setHours(0,0,0,0);

            const filteredEvents = allEvents.filter(e => {
                const isCorrectYear = e.date.startsWith(activeYear);
                const isCancelledVisible = showCancelled || !e.cancelled;
                
                // FIXED CATEGORY LOGIC
                const isCorrectCategory = activeCategory === 'Kaikki' || 
                                          (e.categories && e.categories.includes(activeCategory));
                
                // FIXED AREA LOGIC: 
                // If 'Kaikki' is selected, always return true. 
                // This will include events with areas, "Tuntematon Alue", or missing area keys.
                const isCorrectArea = activeArea === 'Kaikki' || e.area === activeArea;

                return isCorrectYear && isCancelledVisible && isCorrectCategory && isCorrectArea;
            });

            if (filteredEvents.length === 0) {
                container.innerHTML = '<div class="no-events">Ei tapahtumia valituilla suodattimilla.</div>';
                return;
            }

            let currentMonth = '';
            let currentGrid = null;

            filteredEvents.forEach(event => {
                const dateObj = new Date(event.date);
                const monthName = dateObj.toLocaleDateString('fi-FI', { month: 'long' });

                if (monthName !== currentMonth) {
                    currentMonth = monthName;
                    const monthSection = document.createElement('div');
                    monthSection.className = 'month-group';
                    monthSection.innerHTML = `<h2 class="month-header">${monthName} ${activeYear}</h2>`;
                    
                    currentGrid = document.createElement('div');
                    currentGrid.className = 'events-grid';
                    
                    monthSection.appendChild(currentGrid);
                    container.appendChild(monthSection);
                }

                currentGrid.appendChild(createEventCard(event, dateObj, today));
            });
        }

        function createEventCard(event, dateObj, today) {
            const card = document.createElement('div');
            card.className = `event-card ${event.cancelled ? 'cancelled' : ''} ${event.is_holiday ? 'holiday' : ''}`;
            
            const formattedDate = dateObj.toLocaleDateString('fi-FI', { weekday: 'short', day: 'numeric', month: 'numeric', year: 'numeric' });
            
            // Closing Soon Logic (7 days)
            let closingSoonHtml = '';
            if (event.deadline && !event.cancelled) {
                const deadlineDate = parseFiDateToJS(event.deadline);
                if (deadlineDate) {
                    const diffTime = deadlineDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays >= 0 && diffDays <= 7) {
                        closingSoonHtml = `<br><span class="closing-soon-tag">⏳ ${diffDays === 0 ? 'tänään!' : diffDays + ' päivää'}</span>`;
                    }
                }
            }

            let deadlineHtml = event.deadline ? `<div class="deadline">⏰ Ilmoittautuminen: ${event.deadline} ${closingSoonHtml}</div>` : '';
            let linkHtml = event.link ? `<a href="${event.link}" target="_blank" class="event-link">🔗 IRMA</a>` : '';
            let cancelBadge = event.cancelled ? `<span class="cancelled-badge">Peruttu</span>` : '';
            let holidayHtml = event.is_holiday ? `<div class="holiday-alert">🇫🇮 Vapaapäivä: ${escapeHtml(event.holiday_name)}</div><br>` : '';

            let tagsHtml = '';
            if (event.categories && event.categories.length > 0) {
                const tags = event.categories.map(cat => `<span class="cat-tag ${cat.toLowerCase().replace(/[^a-zöäå]/g, '')}">${escapeHtml(cat)}</span>`).join('');
                tagsHtml = `<div class="category-tags">${tags}</div>`;
            }
            
            // Display Area alongside the Organizer
            let areaHtml = event.area && event.area !== "Tuntematon Alue" ? `<br>🗺️ Alue: <strong>${escapeHtml(event.area)}</strong>` : '';

            card.innerHTML = `
                ${tagsHtml}
                <h3>${escapeHtml(event.name)} ${cancelBadge}</h3>
                ${holidayHtml}
                <div class="date">📅 ${formattedDate}</div>
                <div class="location">🏢 Järjestäjä: ${escapeHtml(event.location)} ${areaHtml}</div>
                ${deadlineHtml}
                <div class="actions">
                    ${linkHtml}
                    <a href="ics_files/${encodeURIComponent(event.filename)}" class="download-btn" download>📥 Lataa ICS</a>
                </div>
            `;
            
            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>

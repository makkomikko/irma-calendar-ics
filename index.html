<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orienteering Calendar - ICS Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .controls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .controls button:hover {
            background: #764ba2;
        }
        
        .controls button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: white;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .event-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        
        .event-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            word-break: break-word;
        }
        
        .event-card .date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .event-card .date::before {
            content: "📅";
            margin-right: 8px;
        }
        
        .event-card .location {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .event-card .location::before {
            content: "📍";
            margin-right: 8px;
        }
        
        .event-card .download-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .event-card .download-btn:hover {
            background: #764ba2;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
        }
        
        .no-events {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.1em;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏃 Orienteering Calendar</h1>
            <p>Download upcoming competitions as ICS files for your calendar</p>
        </header>
        
        <div class="controls">
            <button id="refreshBtn" onclick="loadEvents()">🔄 Refresh Events</button>
        </div>
        
        <div id="message"></div>
        <div id="loading" class="loading" style="display: none;">
            ⏳ Loading events...
        </div>
        <div id="events" class="events-grid"></div>
        
        <footer>
            <p>Data source: Finnish Orienteering Association (IRMA Calendar)</p>
            <p>Last updated: <span id="lastUpdated">-</span></p>
        </footer>
    </div>
    
    <script>
        async function loadEvents() {
            const eventsDiv = document.getElementById('events');
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            const refreshBtn = document.getElementById('refreshBtn');
            
            eventsDiv.innerHTML = '';
            messageDiv.innerHTML = '';
            loadingDiv.style.display = 'block';
            refreshBtn.disabled = true;
            
            try {
                const response = await fetch('ics_files/events.json');
                
                if (!response.ok) {
                    throw new Error('Failed to load events. Please ensure the scraper has been run.');
                }
                
                const events = await response.json();
                loadingDiv.style.display = 'none';
                
                if (events.length === 0) {
                    eventsDiv.innerHTML = '<div class="no-events">No upcoming events found</div>';
                    return;
                }
                
                // Sort events by date
                events.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                events.forEach(event => {
                    const eventCard = createEventCard(event);
                    eventsDiv.appendChild(eventCard);
                });
                
                messageDiv.innerHTML = `<div class="success">✓ Loaded ${events.length} upcoming competitions</div>`;
                document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
                
            } catch (error) {
                loadingDiv.style.display = 'none';
                messageDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
                console.error('Error:', error);
            } finally {
                refreshBtn.disabled = false;
            }
        }
        
        function createEventCard(event) {
            const card = document.createElement('div');
            card.className = 'event-card';
            
            const date = new Date(event.date);
            const formattedDate = date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            card.innerHTML = `
                <h3>${escapeHtml(event.name)}</h3>
                <div class="date">${formattedDate}</div>
                <div class="location">${escapeHtml(event.location)}</div>
                <a href="ics_files/${encodeURIComponent(event.filename)}" 
                   class="download-btn" 
                   download>
                   📥 Download ICS
                </a>
            `;
            
            return card;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load events on page load
        window.addEventListener('load', loadEvents);
    </script>
</body>
</html>

name: Scrape and Generate ICS

on:
  schedule:
    - cron: '0 2 * * *'  # Main scraper daily at 02:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright icalendar holidays
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps
      
      # Run club scraper only on Sundays or if manually triggered
      - name: Run club area scraper
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * 0'
        run: python clubs_scraper.py

      - name: Run main calendar scraper
        run: python scraper.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ics_files/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update events $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)

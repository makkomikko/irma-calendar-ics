name: Scrape and Generate ICS

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 icalendar playwright holidays
          
          # Fix for the libasound2 virtual package error in Ubuntu 24.04+
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          
          # Install browser engine and remaining system dependencies
          playwright install chromium --with-deps
      
      - name: Run club area scraper
        run: python clubs_scraper.py

      - name: Run main calendar scraper
        run: python scraper.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ics_files/
          # Only push if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update events $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
